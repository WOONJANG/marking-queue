<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIREU STORE 마킹 현황</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="hero-inner">
        <div>
          <div class="brand-badge">
            <span class="brand-dot"></span>
            YONGIN FC MIREU STORE
          </div>
          <h1>마킹 현황</h1>
          <div class="sub">
            작업번호 기준으로 현재 마킹 진행 상태를 확인할 수 있습니다.
          </div>
        </div>

        <div class="hero-side">
          <a href="https://www.yonginfc.co.kr/" class="hero-link" target="_blank" rel="noopener noreferrer">
            <div class="hero-chip">용인 FC</div>
          </a>
          <a href="https://www.yonginfcstore.com/" class="hero-link" target="_blank" rel="noopener noreferrer">
            <div class="hero-chip">미르 스토어</div>
          </a>
          <div class="hero-chip">5초 자동 새로고침</div>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="topbar">
        <div>
          <h2 class="section-title">마킹 진행 현황</h2>
          <div class="section-sub">작업번호 / 이름 / 전화번호로 검색 가능</div>
        </div>

        <div class="search">
          <div class="search-box">
            <input
              type="text"
              id="searchInput"
              placeholder="작업번호 / 이름 / 전화번호"
            />
          </div>
          <!--
          <button type="button" class="btn-primary" id="refreshBtn">새로고침</button>
          -->
        </div>
      </div>

      <div class="stats">
        <div class="stat total">
          <div class="stat-label">전체 접수</div>
          <b id="statTotal">0</b>
        </div>
        <div class="stat waiting">
          <div class="stat-label">대기중</div>
          <b id="statWaiting">0</b>
        </div>
        <div class="stat done">
          <div class="stat-label">완료</div>
          <b id="statDone">0</b>
        </div>
      </div>

      <div class="updated">
        <span class="pulse"></span>
        마지막 업데이트: <span id="updatedAt">-</span>
      </div>
    </section>

    <section class="card">
      <div class="table-wrap">
        <table>
          <colgroup>
            <col style="width: 24%">
            <col style="width: 22%">
            <col style="width: 30%">
            <col style="width: 24%">
          </colgroup>
          <thead>
            <tr>
              <th>작업번호</th>
              <th>이름</th>
              <th>전화번호 뒤 4자리</th>
              <th>상태</th>
            </tr>
          </thead>
          <tbody id="queueBody">
            <tr><td colspan="4" class="muted">데이터를 불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>

      <div id="mobileList" class="mobile-list">
        <div class="muted">데이터를 불러오는 중...</div>
      </div>

      <div class="foot-note">
        완료 상태가 표시된 경우, 미르스토어로 방문하여 작업번호표를 반납하고 수령 해주세요.
      </div>
    </section>

    <ins class="kakao_ad_area" style="display:none;"
      data-ad-unit="DAN-h3tYbIfNF0lmX3Ke"
      data-ad-width="320"
      data-ad-height="100"></ins>
    <script type="text/javascript" src="https://t1.daumcdn.net/kas/static/ba.min.js" async></script>

    <footer class="footer">
      made by <b id="adminTrigger" class="admin-trigger">WOONIVERSE.</b>
    </footer>
  </div>

  <script src="./js/app.js"></script>
</body>
</html>
